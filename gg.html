<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Question 💖</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    overflow:hidden;
}

.container{
    margin-top:150px;
}

h1{
    font-size:40px;
    color:#fff;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:20px;
    transition:0.3s;
}

#yes{
    background:#4CAF50;
    color:white;
}

#yes:hover{
    transform:scale(1.2);
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#message{
    font-size:30px;
    color:white;
    margin-top:30px;
}
</style>
</head>

<body>

<div class="container">
<h1>Hey... I have a question for you 😳</h1>
<h2>Will you be mine? ❤️</h2>

<button id="yes" onclick="yesClicked()">Yes 💖</button>
<button id="no">No 😅</button>

<div id="message"></div>
</div>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

function yesClicked(){
    document.body.style.background="black";
    document.getElementById("message").innerHTML =
    "🎉 YAY!!! You just made me the happiest person alive! ❤️🥰";
}

</script>

</body>
</html>
